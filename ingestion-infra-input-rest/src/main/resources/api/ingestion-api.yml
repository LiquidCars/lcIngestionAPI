openapi: 3.0.3
info:
  title: Liquidcars Ingestion Service API
  description: |
    API for bulk vehicle offer ingestion (LiquidCars).
    Designed to handle 170k+ records using reactive processing and streaming.
    
    **Security Roles:**
    - `LCSupport_role`: Support and administration.
    - `M2M_role`: Automated system integration.
  contact:
    name: Platform Engineering Team
    email: support@liquidcars.net
  version: 1.2.0

servers:
  - url: http://localhost:8890
    description: Local development server

paths:
  # --- Ingestion Operations ---
  /v1/ingestion/batch:
    post:
      tags:
        - Ingestion
      summary: Ingest JSON Batches
      operationId: ingestBatch
      x-roles: [LCSupport_role, M2M_role]
      parameters:
        - $ref: '#/components/parameters/InventoryIdParam'
        - $ref: '#/components/parameters/DumpTypeParam'
        - $ref: '#/components/parameters/ExternalPubIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionPayload'
      responses:
        '202':
          description: Batch accepted.

  /v1/ingestion/stream:
    post:
      tags:
        - Ingestion
      summary: Ingest via Binary Stream
      operationId: ingestStream
      x-roles: [LCSupport_role, M2M_role]
      parameters:
        - $ref: '#/components/parameters/FormatParam'
        - $ref: '#/components/parameters/InventoryIdParam'
        - $ref: '#/components/parameters/DumpTypeParam'
        - $ref: '#/components/parameters/PublishDateParam'
        - $ref: '#/components/parameters/ExternalPubIdParam'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Stream accepted.

  /v1/ingestion/url:
    post:
      tags:
        - Ingestion
      summary: Ingest via URL (Pull)
      operationId: ingestFromUrl
      x-roles: [LCSupport_role, M2M_role]
      parameters:
        - $ref: '#/components/parameters/FormatParam'
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
        - $ref: '#/components/parameters/InventoryIdParam'
        - $ref: '#/components/parameters/DumpTypeParam'
        - $ref: '#/components/parameters/PublishDateParam'
        - $ref: '#/components/parameters/ExternalPubIdParam'
      responses:
        '202':
          description: Upload started.

  # --- Management Operations ---
  /v1/ingestion/reports:
    get:
      tags:
        - Ingestion
      summary: List all ingestion reports
      operationId: findIngestionReports
      x-roles: [LCSupport_role, M2M_role]
      parameters:
        - name: page
          in: query
          description: Page number (0..N)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Elements per page
          schema:
            type: integer
            default: 20
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IngestionReportSortField'
        - name: sortDirection
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SortDirection'
            default: DESC
        - name: processType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IngestionProcessType'
        - name: requesterParticipantId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: inventoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: externalRequestId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IngestionBatchStatus'
        - name: dumpType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IngestionDumpType'
        - name: processed
          in: query
          required: false
          schema:
            type: boolean
        - name: createdFrom
          in: query
          required: false
          description: Filter reports created after this date
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          required: false
          description: Filter reports created before this date
          schema:
            type: string
            format: date-time
        - name: updatedFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updatedTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of reports retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionReportPage'

  /v1/ingestion/reports/{ingestionReportId}:
    get:
      tags:
        - Ingestion
      summary: Get report by job/report identifier
      operationId: findIngestionReportById
      x-roles: [LCSupport_role, M2M_role]
      parameters:
        - name: ingestionReportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionReport'

  /v1/ingestion/promote/{ingestionReportId}:
    post:
      tags:
        - Ingestion
      summary: Promote draft offers to production collection
      operationId: promoteDraftOffers
      x-roles: [LCSupport_role]
      parameters:
        - name: ingestionReportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Promotion triggered successfully.

  /v1/ingestion/draft/{ingestionReportId}:
    delete:
      tags:
        - Ingestion
      summary: Clean up draft offers from temporary collection
      operationId: deleteDraftOffers
      x-roles: [LCSupport_role]
      parameters:
        - name: ingestionReportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Drafts deleted.

components:
  parameters:
    FormatParam:
      name: format
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/IngestionFormat'
    InventoryIdParam:
      name: inventoryId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    DumpTypeParam:
      name: dumpType
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/IngestionDumpType'
    PublishDateParam:
      name: publicationDate
      in: query
      required: false
      schema:
        type: string
        format: date-time
    ExternalPubIdParam:
      name: externalPublicationId
      in: query
      required: false
      schema:
        type: string

  schemas:
    IngestionFormat:
      type: string
      enum: [xml, json]

    IngestionProcessType:
      type: string
      enum: [ FILE, PROCESS ]
      default: FILE

    IngestionBatchStatus:
      type: string
      enum: [ COMPLETED, STARTING, STARTED, STOPPING, STOPPED, FAILED, ABANDONED, UNKNOWN ]
      default: COMPLETED

    IngestionDumpType:
      type: string
      enum: [UPDATE, REPLACEMENT]
      default: UPDATE

    IngestionPayload:
      type: object
      properties:
        offers:
          type: array
          items:
            $ref: '#/components/schemas/OfferRequest'
        offersToDelete:
          type: array
          items:
            type: string
            description: External IDs to be removed

    OfferRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sellerType:
          $ref: '#/components/schemas/CarOfferSellerTypeEnum'
        privateOwnerRegisteredUserId:
          type: string
          format: uuid
        hash:
          type: integer
        externalIdInfo:
          $ref: '#/components/schemas/ExternalIdInfo'
        vehicleInstance:
          $ref: '#/components/schemas/VehicleInstance'
        price:
          $ref: '#/components/schemas/Money'
        financedPrice:
          $ref: '#/components/schemas/Money'
        financedInstallmentAprox:
          $ref: '#/components/schemas/Money'
        financedText:
          type: string
        priceNew:
          $ref: '#/components/schemas/Money'
        professionalPrice:
          $ref: '#/components/schemas/Money'
        taxDeductible:
          type: boolean
        obs:
          type: string
        internalNotes:
          type: string
        resources:
          type: array
          items:
            $ref: '#/components/schemas/CarOfferResource'
        guarantee:
          type: boolean
        guaranteeMonths:
          type: integer
        guaranteeText:
          type: string
        certified:
          type: boolean
        installation:
          type: string
        mail:
          type: string
          format: email
        pickUpAddress:
          $ref: '#/components/schemas/ParticipantAddress'
        jsonCarOfferId:
          type: string
          format: uuid

    ExternalIdInfo:
      type: object
      properties:
        ownerReference:
          type: string
        dealerReference:
          type: string
        channelReference:
          type: string

    VehicleInstance:
      type: object
      properties:
        id:
          type: integer
          format: int64
        vehicleModel:
          $ref: '#/components/schemas/VehicleModel'
        plate:
          type: string
        color:
          $ref: '#/components/schemas/KeyValue'
        mileage:
          type: integer
        registrationYear:
          type: integer
        registrationMonth:
          type: integer
        isMetallicPaint:
          type: boolean
        chassisNumber:
          type: string
        equipments:
          type: array
          items:
            $ref: '#/components/schemas/CarInstanceEquipment'
        state:
          $ref: '#/components/schemas/KeyValue'

    VehicleModel:
      type: object
      properties:
        id:
          type: integer
        brand:
          type: string
        model:
          type: string
        version:
          type: string
        bodyType:
          $ref: '#/components/schemas/KeyValue'
        numDoors:
          type: integer
        cv:
          type: integer
        numCylinders:
          type: integer
        displacement:
          type: integer
        urbanConsumption:
          type: number
        roadConsumption:
          type: number
        avgConsumption:
          type: number
        numGears:
          type: integer
        kgWeight:
          type: integer
        changeType:
          $ref: '#/components/schemas/KeyValue'
        fuelType:
          $ref: '#/components/schemas/KeyValue'
        numSeats:
          type: integer
        drivetrainType:
          $ref: '#/components/schemas/KeyValue'
        euroTaxCode:
          type: string
        environmentalBadge:
          $ref: '#/components/schemas/KeyValue'
        cmWidth:
          type: integer
        cmLength:
          type: integer
        cmHeight:
          type: integer
        litresTrunk:
          type: integer
        litresTank:
          type: integer
        maxSpeed:
          type: integer
        maxEmissions:
          type: integer
        acceleration:
          type: number

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
        currency:
          type: string

    KeyValue:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

    CarInstanceEquipment:
      type: object
      properties:
        id:
          type: integer
        equipment:
          $ref: '#/components/schemas/KeyValue'
        category:
          $ref: '#/components/schemas/KeyValue'
        type:
          $ref: '#/components/schemas/KeyValue'
        description:
          type: string
        code:
          type: string
        price:
          $ref: '#/components/schemas/Money'

    CarOfferResource:
      type: object
      properties:
        id:
          type: integer
        type:
          $ref: '#/components/schemas/KeyValue'
        resource:
          type: string
        compressedResource:
          type: string
          format: byte

    ParticipantAddress:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/AddressType'
        address:
          $ref: '#/components/schemas/PostalAddress'

    PostalAddress:
      type: object
      properties:
        name:
          type: string
        gpsLocation:
          $ref: '#/components/schemas/GPSLocation'
        streetNumber:
          type: string
        streetAddress:
          type: string
        extendedAddress:
          type: string
        postalCode:
          type: string
        city:
          type: string
        region:
          type: string
        country:
          type: string
        countryCode:
          type: string
        poBox:
          type: string
        type:
          type: string

    GPSLocation:
      type: object
      properties:
        name:
          type: string
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double

    CarOfferSellerTypeEnum:
      type: string
      enum: [usedCar_ProfessionalSeller, usedCar_PrivateSeller]

    AddressType:
      type: string
      enum: [P_HOME, B_RETAIL, B_PICKUP, B_EXPERTISE]

    IngestionReportPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/IngestionReport'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        last:
          type: boolean

    IngestionReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        processType:
          type: string
        batchJobId:
          type: string
          format: uuid
        requesterParticipantId:
          type: string
          format: uuid
        inventoryId:
          type: string
          format: uuid
        externalRequestId:
          type: string
        publicationDate:
          type: string
          format: date-time
        status:
          type: string
        dumpType:
          $ref: '#/components/schemas/IngestionDumpType'
        readCount:
          type: integer
        writeCount:
          type: integer
        skipCount:
          type: integer
        failedExternalIds:
          type: array
          items:
            $ref: '#/components/schemas/ExternalIdInfo'
        idsForDelete:
          type: array
          items:
            type: string
        processed:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SortDirection:
      type: string
      enum: [ ASC, DESC ]

    IngestionReportSortField:
      type: string
      enum:
        - id
        - processType
        - requesterParticipantId
        - inventoryId
        - externalRequestId
        - status
        - processed
        - createdAt
        - updatedAt