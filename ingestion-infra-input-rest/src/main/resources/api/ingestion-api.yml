openapi: 3.0.3
info:
  title: Liquidcars Ingestion Service API
  description: |
    API for bulk vehicle offer ingestion (LiquidCars).
    Designed to handle 170k+ records using reactive processing and streaming.
    
    **Business Logic (HU):**
    - `inventoryId`: Target inventory. Defaults to General Inventory if null.
    - `dumpType`: `UPDATE` (Merge) or `REPLACEMENT` (Full Sync/Delete).
    - `format`: Now enforced via Enum (xml, json).
  contact:
    name: Platform Engineering Team
    email: support@liquidcars.net
  version: 1.1.0

servers:
  - url: http://localhost:8890
    description: Local development server

paths:
  /v1/ingestion/batch:
    post:
      tags:
        - Ingestion
      summary: Ingest JSON Batches
      operationId: ingestBatch
      parameters:
        - $ref: '#/components/parameters/InventoryIdParam'
        - $ref: '#/components/parameters/DumpTypeParam'
        - $ref: '#/components/parameters/ExternalPubIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/OfferRequest'
      responses:
        '202':
          description: Batch accepted.
        '413':
          description: Payload Too Large.

  /v1/ingestion/stream:
    post:
      tags:
        - Ingestion
      summary: Ingest via Binary Stream
      operationId: ingestStream
      parameters:
        - $ref: '#/components/parameters/FormatParam'
        - $ref: '#/components/parameters/InventoryIdParam'
        - $ref: '#/components/parameters/DumpTypeParam'
        - $ref: '#/components/parameters/PublishDateParam'
        - $ref: '#/components/parameters/ExternalPubIdParam'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Stream accepted.

  /v1/ingestion/url:
    post:
      tags:
        - Ingestion
      summary: Ingest via URL (Pull)
      operationId: ingestFromUrl
      parameters:
        - $ref: '#/components/parameters/FormatParam'
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
        - $ref: '#/components/parameters/InventoryIdParam'
        - $ref: '#/components/parameters/DumpTypeParam'
        - $ref: '#/components/parameters/PublishDateParam'
        - $ref: '#/components/parameters/ExternalPubIdParam'
      responses:
        '202':
          description: Upload started.

components:
  parameters:
    FormatParam:
      name: format
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/IngestionFormat'
    InventoryIdParam:
      name: inventoryId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    DumpTypeParam:
      name: dumpType
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/IngestionDumpType'
    PublishDateParam:
      name: publicationDate
      in: query
      required: false
      schema:
        type: string
        format: date-time
    ExternalPubIdParam:
      name: externalPublicationId
      in: query
      required: false
      schema:
        type: string

  schemas:
    IngestionFormat:
      type: string
      enum: [xml, json]

    IngestionDumpType:
      type: string
      enum: [UPDATE, REPLACEMENT]
      default: UPDATE

    OfferRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sellerType:
          $ref: '#/components/schemas/CarOfferSellerTypeEnum'
        privateOwnerRegisteredUserId:
          type: string
          format: uuid
        externalIdInfo:
          $ref: '#/components/schemas/ExternalIdInfo'
        vehicleInstance:
          $ref: '#/components/schemas/VehicleInstance'
        price:
          $ref: '#/components/schemas/Money'
        financedPrice:
          $ref: '#/components/schemas/Money'
        financedInstallmentAprox:
          $ref: '#/components/schemas/Money'
        financedText:
          type: string
        priceNew:
          $ref: '#/components/schemas/Money'
        professionalPrice:
          $ref: '#/components/schemas/Money'
        taxDeductible:
          type: boolean
        obs:
          type: string
        internalNotes:
          type: string
        resources:
          type: array
          items:
            $ref: '#/components/schemas/CarOfferResource'
        guarantee:
          type: boolean
        guaranteeMonths:
          type: integer
        guaranteeText:
          type: string
        certified:
          type: boolean
        installation:
          type: string
        mail:
          type: string
          format: email
        pickUpAddress:
          $ref: '#/components/schemas/ParticipantAddress'
        hash:
          type: integer
        jsonCarOfferId:
          type: string
          format: uuid
    ExternalIdInfo:
      type: object
      properties:
        ownerReference:
          type: string
        dealerReference:
          type: string
        channelReference:
          type: string
    VehicleInstance:
      type: object
      properties:
        id:
          type: integer
          format: int64
        vehicleModel:
          $ref: '#/components/schemas/VehicleModel'
        plate:
          type: string
        color:
          $ref: '#/components/schemas/KeyValue'
        mileage:
          type: integer
        registrationYear:
          type: integer
        registrationMonth:
          type: integer
        isMetallicPaint:
          type: boolean
        chassisNumber:
          type: string
        equipments:
          type: array
          items:
            $ref: '#/components/schemas/CarInstanceEquipment'
        state:
          $ref: '#/components/schemas/KeyValue'

    VehicleModel:
      type: object
      properties:
        brand:
          type: string
        model:
          type: string
        version:
          type: string
        bodyType:
          $ref: '#/components/schemas/KeyValue'
        fuelType:
          $ref: '#/components/schemas/KeyValue'
        changeType:
          $ref: '#/components/schemas/KeyValue'
        cv:
          type: integer
        displacement:
          type: integer
        avgConsumption:
          type: number
          format: double

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
        currency:
          type: string

    KeyValue:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

    CarInstanceEquipment:
      type: object
      properties:
        id:
          type: integer
        equipment:
          $ref: '#/components/schemas/KeyValue'
        price:
          $ref: '#/components/schemas/Money'

    CarOfferResource:
      type: object
      properties:
        id:
          type: integer
        type:
          $ref: '#/components/schemas/KeyValue'
        resource:
          type: string

    ParticipantAddress:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/AddressType'
        address:
          $ref: '#/components/schemas/PostalAddress'

    PostalAddress:
      type: object
      properties:
        name:
          type: string
        gpsLocation:
          $ref: '#/components/schemas/GPSLocation'
        streetAddress:
          type: string
        city:
          type: string
        postalCode:
          type: string
        countryCode:
          type: string

    GPSLocation:
      type: object
      properties:
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double

    CarOfferSellerTypeEnum:
      type: string
      enum: [usedCar_ProfessionalSeller, usedCar_PrivateSeller]

    AddressType:
      type: string
      enum: [P_HOME, B_RETAIL, B_PICKUP, B_EXPERTISE]