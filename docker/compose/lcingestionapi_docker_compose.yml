services:
    db:
        image: postgres:17.2
        restart: always
        # set shared memory limit when using docker-compose
        shm_size: 128mb
        # or set shared memory limit when deploy via swarm stack
        #volumes:
        #  - type: tmpfs
        #    target: /dev/shm
        #    tmpfs:
        #      size: 134217728 # 128*2^20 bytes = 128Mb
        environment:
            POSTGRES_PASSWORD: postgres
            TZ: UTC
        ports:
            - 5432:5432
        volumes:
            - "./db/init_db.sql:/init_db.sql"
            - "./db/startup_db.sh:/startup_db.sh"  # Mount the startup script
        entrypoint: [ "/bin/bash", "/startup_db.sh" ]  # Use the startup script as entrypoint
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 20s  # Increase the interval to give more time
            retries: 10    # Increase the number of retries
            start_period: 30s  # Initial delay before starting health checks
        networks:
            - lcingestionapi_network
    adminer:
        image: adminer
        restart: always
        ports:
            - 8081:8080
        networks:
            - lcingestionapi_network
    mongodb:
        image: mongo:latest
        container_name: mongodb_local
        environment:
            - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
            - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
            - MONGO_DATABASE=${MONGO_DATABASE}
        volumes:
            - "./db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro"
        ports:
            - "27017:27017"
        healthcheck:
            test: "mongosh --eval 'db.runCommand({ping: 1})'"
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - lcingestionapi_network
    kafdrop:
        image: obsidiandynamics/kafdrop
        restart: "no"
        ports:
            - "9000:9000"
        environment:
            - KAFKA_BROKERCONNECT=${KAFKA_BROKERCONNECT}
        depends_on:
            - "kafka"
        networks:
            - lcingestionapi_network
    kafka:
        image: obsidiandynamics/kafka
        restart: "no"
        ports:
            - "2181:2181"
            - "9092:9092"
        environment:
            - KAFKA_LISTENERS=${KAFKA_LISTENERS}
            - KAFKA_ADVERTISED_LISTENERS=${KAFKA_ADVERTISED_LISTENERS}
            - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
            - KAFKA_INTER_BROKER_LISTENER_NAME=${KAFKA_INTER_BROKER_LISTENER_NAME}
            - KAFKA_ZOOKEEPER_SESSION_TIMEOUT=${KAFKA_ZOOKEEPER_SESSION_TIMEOUT}
            - KAFKA_RESTART_ATTEMPTS=${KAFKA_RESTART_ATTEMPTS}
            - KAFKA_RESTART_DELAY=${KAFKA_RESTART_DELAY}
            - ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL=${ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL}
        networks:
            - lcingestionapi_network
    lcingestionapi-service-app:
        build:
            context: ../..
            dockerfile: ./docker/dockerfiles/Dockerfile_local
        image: lcingestionapi-service-app
        container_name: lcingestionapi-service-app-running
        depends_on:
            db:
                condition: service_healthy
            rabbitmq:
                condition: service_started
            keycloak:
                condition: service_healthy
        networks:
            - lcapi_network
        ports:
            - "8890:8890"
            - "5005:5005"
        environment:
            - SPRING_PROFILES_ACTIVE=DEV
            - SERVER_SSL_KEY_STORE_PASSWORD=${SERVER_SSL_KEY_STORE_PASSWORD}
            - MAIL_NOREPLY_ACC=${MAIL_NOREPLY_ACC}
            - SERVER_SSL_KEY_STORE_PASSWORD=${SERVER_SSL_KEY_STORE_PASSWORD}
            - MAIL_NOREPLY_ACC=${MAIL_NOREPLY_ACC}
            - MAIL_NOREPLY_PWD=${MAIL_NOREPLY_PWD}
            - GMAIL_SERVICE_ACCOUNT_PROJECT=${GMAIL_SERVICE_ACCOUNT_PROJECT}
            - GMAIL_SERVICE_ACCOUNT_PRIVATE_KEY_ID=${GMAIL_SERVICE_ACCOUNT_PRIVATE_KEY_ID}
            - GMAIL_SERVICE_ACCOUNT_PRIVATE_KEY=${GMAIL_SERVICE_ACCOUNT_PRIVATE_KEY}
            - GMAIL_SERVICE_ACCOUNT_CLIENT_EMAIL=${GMAIL_SERVICE_ACCOUNT_CLIENT_EMAIL}
            - GMAIL_SERVICE_ACCOUNT_CLIENT_ID=${GMAIL_SERVICE_ACCOUNT_CLIENT_ID}
            - GMAIL_SERVICE_ACCOUNT_X509_URL=${GMAIL_SERVICE_ACCOUNT_X509_URL}
            - GMAIL_USER_IMPERSONATED=${GMAIL_USER_IMPERSONATED}
            - GMAIL_APPLICATION_NAME=${GMAIL_APPLICATION_NAME}
            - OAUTH_ENCRYPTION_PWD=${OAUTH_ENCRYPTION_PWD}
            - OAUTH_PRIVATE_KEY=${OAUTH_PRIVATE_KEY}
            - OAUTH_PRIVATE_KEY_STRONG=${OAUTH_PRIVATE_KEY_STRONG}
            - OAUTH_PUBLIC_KEY_STRONG=${OAUTH_PUBLIC_KEY_STRONG}
            - OAUTH_ZERO_COM_HASH=${OAUTH_ZERO_COM_HASH}
            - OAUTH_ZERO_COM_CLIENT_ID=${OAUTH_ZERO_COM_CLIENT_ID}
            - OAUTH_ZERO_COM_CLIENT_SECRET=${OAUTH_ZERO_COM_CLIENT_SECRET}
            - OAUTH_ZERO_COM_CLIENT_ID_ADMINWEB=${OAUTH_ZERO_COM_CLIENT_ID_ADMINWEB}
            - OAUTH_ZERO_COM_CLIENT_SECRET_ADMINWEB=${OAUTH_ZERO_COM_CLIENT_SECRET_ADMINWEB}
            - OAUTH_ZERO_COM_CLIENT_ID_PROWEB=${OAUTH_ZERO_COM_CLIENT_ID_PROWEB}
            - OAUTH_ZERO_COM_CLIENT_SECRET_PROWEB=${OAUTH_ZERO_COM_CLIENT_SECRET_PROWEB}
            - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
            - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
            - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
            - SPRING_RABBITMQ_HOST=${SPRING_RABBITMQ_HOST}
            - SPRING_RABBITMQ_USERNAME=${SPRING_RABBITMQ_USERNAME}
            - SPRING_RABBITMQ_PASSWORD=${SPRING_RABBITMQ_PASSWORD}
            - SPRING_RABBITMQ_VIRTUAL_HOST=${SPRING_RABBITMQ_VIRTUAL_HOST}
            - SPRING_RABBITMQ_PORT=${SPRING_RABBITMQ_PORT}
            - KYC_TECALIS_APIKEY=${KYC_TECALIS_APIKEY}
            - KYC_TECALIS_PROFILECONFIG=${KYC_TECALIS_PROFILECONFIG}
            - KYC_ALICE_APIKEY=${KYC_ALICE_APIKEY}
            - STRIPE_APIKEY=${STRIPE_APIKEY}
            - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            - STRIPE_WEBHOOK_CONNECTED_ACCOUNTS_SECRET=${STRIPE_WEBHOOK_CONNECTED_ACCOUNTS_SECRET}
            - SWIPOO_CLIENT_ID=${SWIPOO_CLIENT_ID}
            - SWIPOO_CLIENT_SECRET=${SWIPOO_CLIENT_SECRET}
            - SWIPOO_INTERMEDIARY_ID=${SWIPOO_INTERMEDIARY_ID}
            - ELK_API_KEY=${ELK_API_KEY}
            - ELK_FINGERPRINT=${ELK_FINGERPRINT}
            - SPRING_REDIS_PASSWORD=${SPRING_REDIS_PASSWORD}
            - GARRIGUES_CLIENT_ID=${GARRIGUES_CLIENT_ID}
            - GARRIGUES_SECRET=${GARRIGUES_SECRET}
            - APP_CUSTOM_TEST_DATE=${APP_CUSTOM_TEST_DATE}
            - APP_CUSTOM_TEST_DATE_RUNNING=${APP_CUSTOM_TEST_DATE_RUNNING}
            - HTTP_LOG_VERBOSITY=${HTTP_LOG_VERBOSITY}
            - KEYCLOAK_BASE_URL=${KEYCLOAK_BASE_URL}
            - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
            - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
            - KEYCLOAK_MIGRATION_ENABLED=${KEYCLOAK_MIGRATION_ENABLED}
            - DUMMY_DOCKER_MODE=${DUMMY_DOCKER_MODE}
            - APP_SERVER_PORT=${APP_SERVER_PORT}
        command: >
            java -jar /app/lcIngestionAPI.jar
            --spring.config.additional-location=file:/app/resources/
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s  # Longer delay to allow proper initialization
    keycloak-db:
        image: postgres:17.2
        container_name: keycloak-db
        restart: always
        environment:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: keycloak
        volumes:
            - "./db/keycloak/init_after_dump.sql:/init_after_dump.sql"
            - "./db/keycloak/keycloak_dump.dmp:/keycloak_dump.dmp"
            - "./db/keycloak/startup_db.sh:/startup_db.sh"  # Mount the startup script
        tmpfs:
            - /var/lib/postgresql/data  # Use tmpfs for the data directory
        ports:
            - "5433:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 20s  # Increase the interval to give more time
            retries: 10    # Increase the number of retries
            start_period: 30s  # Initial delay before starting health checks
        entrypoint: [ "/bin/bash", "/startup_db.sh" ]  # Use the startup script as entrypoint
        networks:
            - lcingestionapi_network
    keycloak:
        image: quay.io/keycloak/keycloak:26.0.1
        container_name: keycloak
        command: start-dev
        environment:
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: keycloak
            KEYCLOAK_FRONTEND_URL: http://keycloak:8080
        ports:
            - "8080:8080"
        depends_on:
            - keycloak-db
        healthcheck:
            test: [ "CMD-SHELL", "echo > /dev/tcp/localhost/8080 || exit 1" ]
            interval: 20s
            timeout: 10s
            retries: 10
            start_period: 40s
        networks:
            - lcingestionapi_network
    redis:
        image: redis:7.2-alpine
        container_name: redis-local
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        command: [ "redis-server", "--appendonly", "yes" ]
        networks:
            - lcingestionapi_network
volumes:
    redis-data:
networks:
    lcingestionapi_network:
        driver: bridge