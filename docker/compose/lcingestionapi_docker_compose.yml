services:
    mongodb:
        image: mongo:latest
        container_name: mongodb_local
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
            - MONGO_DATABASE=${MONGO_DATABASE}
        volumes:
            - "./db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro"
        ports:
            - "27017:27017"
        healthcheck:
            test: "mongosh --eval 'db.runCommand({ping: 1})'"
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - lcingestionapi_network

    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        environment:
            ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
            ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
        ports:
            - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"
        networks:
            - lcingestionapi_network

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        depends_on:
            - zookeeper
        ports:
            - "${KAFKA_EXTERNAL_PORT}:${KAFKA_EXTERNAL_PORT}"
            - "${KAFKA_EXTERNAL_PORT2}:${KAFKA_EXTERNAL_PORT2}"
        environment:
            KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
            KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}

            KAFKA_LISTENERS: ${KAFKA_LISTENERS}
            KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
            KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}

            # REQUIRED for Kafka transactions
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}

            # Stability
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS}
        networks:
            - lcingestionapi_network

    kafdrop:
        image: obsidiandynamics/kafdrop
        depends_on:
            - kafka
        ports:
            - "9000:9000"
        environment:
            KAFKA_BROKERCONNECT: ${KAFKA_BROKERCONNECT}
        networks:
            - lcingestionapi_network

    lcingestionapi-service-app:
        build:
            context: ../..
            dockerfile: ./docker/dockerfiles/Dockerfile_local
        image: lcingestionapi-service-app
        container_name: lcingestionapi-service-app-running
        depends_on:
            mongodb:
                condition: service_healthy
            kafka:
                condition: service_started
        networks:
            - lcingestionapi_network
        extra_hosts:
            - "keycloak:host-gateway"
        ports:
            - "${SERVER_PORT}:8890" # Mapeo dinámico usando el .env
            - "5006:5006"
        environment:
            - SPRING_PROFILES_ACTIVE=DEV
            # Mapeo de variables del .env a Spring Boot
            - SERVER_PORT=${SERVER_PORT}
            - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
            - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
            - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
            - SPRING_DATA_MONGODB_URI=${SPRING_MONGO_URL}
            - LIQUIBASE_MONGO_URL=${LIQUIBASE_MONGO_URL}
            - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_HOST}
            - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
            - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            - OFFERS_TEST_URL=${OFFERS_TEST_URL}
            - SECURITY_MAX_BATCH_SIZE=${SECURITY_MAX_BATCH_SIZE}
            - JDBC_BATCH_SIZE=${JDBC_BATCH_SIZE}
            - BATCH_CHUNK_SIZE=${BATCH_CHUNK_SIZE}
            - BATCH_SKIP_LIMIT=${BATCH_SKIP_LIMIT}
            - BATCH_QUEUE_SIZE=${BATCH_QUEUE_SIZE}
        command: >
            java -jar /app/lcIngestionAPI.jar
            --spring.config.additional-location=file:/app/resources/
        healthcheck:
            # Nota: pg_isready es para Postgres. Si la app no tiene Postgres instalado, esto fallará.
            # Se recomienda usar un endpoint de actuator: curl -f http://localhost:8890/actuator/health
            test: [ "CMD", "curl", "-f", "http://localhost:8890/actuator/health" ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s

networks:
    lcingestionapi_network:
        driver: bridge