# Reduce memory requirements on dev
mongodb:
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.cacheSizeGB: 0.25
