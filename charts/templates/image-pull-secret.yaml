{{- $name := printf "%s-regcred" (include "charts.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}

{{- /* pull values and validate when create=true */ -}}
{{- $registry := required "imagePullSecret.registry is required when imagePullSecret.create=true" .Values.imagePullSecret.registry -}}
{{- $username := required "imagePullSecret.username is required when imagePullSecret.create=true" .Values.imagePullSecret.username -}}
{{- $password := required "imagePullSecret.password is required when imagePullSecret.create=true" .Values.imagePullSecret.password -}}
{{- $email := .Values.imagePullSecret.email | default "" -}}

{{- /* build auth (base64 of username:password) */ -}}
{{- $auth := printf "%s:%s" $username $password | b64enc -}}

{{- /* build the docker config as a map and serialize to JSON */ -}}
{{- $cfg := dict "auths" (dict $registry (dict
  "username" $username
  "password" $password
  "email"    $email
  "auth"     $auth
)) -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  annotations:
    "helm.sh/resource-policy": "keep"
  labels:
    {{- include "charts.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $cfg | toJson | b64enc }}
{{- end }}
