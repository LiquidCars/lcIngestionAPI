apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: {{ .Release.Name }}-mongodb
  namespace: {{ .Release.Namespace }}
spec:
  members: {{ .Values.mongodb.replicas }}
  type: ReplicaSet
  version: {{ .Values.mongodb.version }}
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: {{ .Values.mongodb.auth.username }}
      db: {{ .Values.mongodb.auth.database }}
      passwordSecretRef:
        name: {{ .Release.Name }}-mongodb-password
      roles:
        - name: readWrite
          db: {{ .Values.mongodb.auth.database }}
      scramCredentialsSecretName: {{ .Release.Name }}-mongodb-scram
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: {{ .Values.mongodb.storage.storageClass }}
            resources:
              requests:
                storage: {{ .Values.mongodb.storage.size }}
