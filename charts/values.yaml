replicaCount: 1

image:
  repository: liquidcars.azurecr.io/liquidcars/dev/ingestion
  pullPolicy: "IfNotPresent"
  # deploy.sh changes this with an override: --set image.tag=1.2.3
  tag: "0.0.3"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecret:
  create: true
  # the name of the registry secret will be generated. See image-pull-secret.yaml
  # Only used when create=true and secret does not already exist in the namespace:
  registry: liquidcars.azurecr.io
  username: liquidcars # acr-username-or-spn-id
  password: 'wpXdKUJPs5HCbYe0NaZPUxrKSgIT0ZGlEIru4FzSUB+ACRAQBSFR'  #acr-password-or-spn-secret
  email: "devops@liquidcars.com"


configData:
  SPRING_PROFILES_ACTIVE: DEV
  # Mapeo de variables del .env a Spring Boot
  SERVER_PORT: "8890"
  APP_SERVER_PORT: "8890"
  LIQUIBASE_MONGO_URL: mongodb://mongodb:27017/ingestion_service?authSource=admin
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "{{ .Release.Name }}-kafka-kafka-bootstrap:9092"
  SPRING_DATA_MONGODB_URI: "mongodb://myuser:mypassword@{{ .Release.Name }}-mongodb-svc:27017/ingestion_service?replicaSet=mongodb&authSource=admin"
  ##SPRING_DATA_MONGODB_URI: mongodb://ingestion_service:mongo@mongodb:27017/ingestion_service?authSource=admin
  ##KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KEYCLOAK_ISSUER: "https://auth-dev.liquidcars.net/realms/"
  CORS_ALLOWED_ORIGINS: "*"
  OFFERS_TEST_URL: http://localhost:8083/offers.json
  SECURITY_MAX_BATCH_SIZE: 10MB
  # Postgresql
  SPRING_DATASOURCE_URL: jdbc:postgresql://db-lc-dev-eu.postgres.database.azure.com:5432/ingestion-dev?sslmode=require
  SPRING_DATASOURCE_USERNAME: postgreslc
  SPRING_DATASOURCE_PASSWORD: a147b060-Fe68-446B-a27b-db4c0079fca9
  # RabbitMQ
  SPRING_RABBITMQ_HOST: rabbitmq-headless.messaging.svc.cluster.local
  SPRING_RABBITMQ_USERNAME: lcrabbit
  SPRING_RABBITMQ_PASSWORD: lcrabbitpwd
  SPRING_RABBITMQ_VIRTUAL_HOST: /liquidcars-dev

# Kafka (Strimzi)
kafka:
  replicas: 1
  storage:
    size: 8Gi
    storageClass: "managed-csi"

# MongoDB (Community Operator)
mongodb:
  replicas: 1
  version: "7.0.4"
  auth:
    username: myuser
    password: mypassword    # use Azure Key Vault in production
    database: mydb
  storage:
    size: 8Gi
    storageClass: "managed-csi"


