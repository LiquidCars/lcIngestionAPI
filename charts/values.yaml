service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: api-dev.liquidcars.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: be-liquidcars-tls
      hosts:
        - api-dev.liquidcars.net

serviceAccount:
  create: true
  # If not set and create is true, a name is generated using the fullname template
  name: ""

resources:
  requests:
    memory: "2048Mi"
    cpu: "500m"
  limits:
    memory: "4096Mi"
    cpu: "1000m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80


nodeSelector: { }

tolerations: [ ]

affinity: { }

