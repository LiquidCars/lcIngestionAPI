spring:
  application:
    name: ingestion-api
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  
  # MongoDB Configuration
  data:
    mongodb:
      url: mongodb://ingestion_service:mongo@localhost:27017/ingestion_service?authSource=admin
      database: ingestion_service
  
  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5435/ingestion_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 10
        batch.size: 16384
    consumer:
      group-id: liquidcars-ingestion-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
  
  # Spring Batch Configuration
  batch:
    job:
      enabled: false # Don't auto-start jobs on application startup
    jdbc:
      initialize-schema: never
      table-prefix: BATCH_
  
  # Liquibase Migration
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/postgresql/db.changelog-master.xml
  # File Upload Configuration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${security.security-profile-issuer}

#Liquibase Mongo config
liquibase:
  mongodb:
    enabled: true
    change-log: classpath:db/changelog/mongodb/db.changelog-master.xml
    url: mongodb://localhost:27017/ingestion_service?authSource=admin
    user: ingestion_service
    password: mongo

# Server Configuration
server:
  port: 8890
  compression:
    enabled: true
  tomcat:
    max-swallow-size: -1

# Server security Configuration
security:
  # Base URL for Keycloak realms
  security-profile-issuer: ${KEYCLOAK_ISSUER:http://keycloak:8080/realms/}
  # CORS Configuration
  allowed-origins-pattern: ${CORS_ALLOWED_ORIGINS:*}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: Authorization,Cache-Control,Content-Type,X-Requested-With
  exposed-headers: Authorization
  allow-credentials: true
  max-age-seconds: 3600
  # List of paths to monitor size
  size-restricted-paths:
    - /batch
    - /url
  max-batch-size: ${SECURITY_MAX_BATCH_SIZE:10MB}
  
# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.orbyn.ingestion: INFO
    org.springframework.batch: INFO
    org.springframework.kafka: INFO
    liquibase: INFO
    org.liquibase: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Custom Application Properties
ingestion:
  batch:
    chunk-size: 10
    skip-limit: 100
  kafka:
    topics:
      offers: vehicle-offers
  scheduler:
    enabled: true
    remoteUrl: http://localhost:8083/offers.json
    cron: "0 */15 * * * *" # Every 15 minutes
    format: json
