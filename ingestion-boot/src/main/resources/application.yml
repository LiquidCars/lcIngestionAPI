spring:
  application:
    name: ingestion-api
  
  # MongoDB Configuration
  data:
    mongodb:
      host: localhost
      port: 27017
      database: ingestion_db
      auto-index-creation: true
  
  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/ingestion_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 10
        batch.size: 16384
    consumer:
      group-id: ingestion-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
  
  # Spring Batch Configuration
  batch:
    job:
      enabled: false # Don't auto-start jobs on application startup
    jdbc:
      initialize-schema: always
      table-prefix: BATCH_
  
  # Flyway Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# Server Configuration
server:
  port: 8080
  compression:
    enabled: true
  
# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.orbyn.ingestion: DEBUG
    org.springframework.batch: INFO
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Custom Application Properties
ingestion:
  batch:
    chunk-size: 100
    skip-limit: 100
  kafka:
    topics:
      offers: vehicle-offers
  scheduler:
    enabled: true
    watch-directory: /data/ingestion
    cron: "0 */5 * * * *" # Every 5 minutes
